<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fake News Detection{% endblock %} · AI News Verifier</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:,">
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand__mark">FN</span>
        <span class="brand__text">Fake News Detection<span class="brand__sub">ML</span></span>
      </a>
      <nav class="nav-links">
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.path == '/' else '' }}">Detector</a>
        <a href="{{ url_for('about') }}" class="{{ 'active' if request.path == '/about' else '' }}">Model &amp; Stats</a>
      </nav>
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>Fake News Detection using Machine Learning &mdash; TF-IDF + Linear SVM</span>
      <span>Built with scikit-learn &amp; Flask · Runs 100% locally</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
